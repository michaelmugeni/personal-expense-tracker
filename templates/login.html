<link
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  rel="stylesheet"
/>
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
/>

<style>
  @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap");

  body {
    font-family: "Poppins", sans-serif;
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #0d6efd, #0dcaf0, #10b981, #0d6efd);
    background-size: 400% 400%;
    animation: gradientShift 14s ease infinite;
    padding: 20px;
  }

  @keyframes gradientShift {
    0% {
      background-position: 0% 50%;
    }
    50% {
      background-position: 100% 50%;
    }
    100% {
      background-position: 0% 50%;
    }
  }

  .login-card {
    width: 450px;
    max-width: 100%;
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.88);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    animation: cardIn 0.6s ease;
    transition: background-color 0.35s ease, border-color 0.35s ease;
  }

  @keyframes cardIn {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .login-logo {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: linear-gradient(135deg, #10b981, #0dcaf0);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    color: white;
    margin: 0 auto;
    box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
  }

  .form-label {
    font-weight: 500;
    color: #334155;
  }

  .input-group-text {
    background: white;
    border: 1px solid #dbe4ec;
    color: #0d6efd;
  }

  .input-group .form-control {
    border: 1px solid #dbe4ec;
    border-left: none;
    padding: 12px;
  }

  .input-group > :first-child {
    border-top-left-radius: 12px;
    border-bottom-left-radius: 12px;
  }

  .input-group > :last-child {
    border-top-right-radius: 12px;
    border-bottom-right-radius: 12px;
  }

  .input-group .form-control:not(:last-child) {
    border-right: none;
  }

  .input-group:focus-within .input-group-text,
  .input-group:focus-within .form-control {
    border-color: #0d6efd;
    box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.15);
  }

  .toggle-password {
    cursor: pointer;
    user-select: none;
  }

  .forgot-link {
    font-size: 14px;
    color: #0d6efd;
    text-decoration: none;
    font-weight: 500;
  }

  .forgot-link:hover {
    text-decoration: underline;
  }

  .login-btn {
    border-radius: 12px;
    padding: 12px;
    font-weight: 600;
    transition: 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .login-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(13, 110, 253, 0.35);
  }

  .login-btn:disabled {
    opacity: 0.85;
  }

  #loginError {
    border-radius: 12px;
    font-size: 14px;
  }

  #loginError.shake {
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%,
    100% {
      transform: translateX(0);
    }
    25% {
      transform: translateX(-8px);
    }
    75% {
      transform: translateX(8px);
    }
  }

  html[data-theme="dark"] .login-card {
    background: rgba(19, 27, 46, 0.9);
    border-color: rgba(255, 255, 255, 0.08);
  }

  html[data-theme="dark"] .login-card h3,
  html[data-theme="dark"] .form-label {
    color: #e2e8f0;
  }

  html[data-theme="dark"] .input-group-text {
    background: #1a2438;
    border-color: #263449;
    color: #60a5fa;
  }

  html[data-theme="dark"] .input-group .form-control {
    background: #1a2438;
    border-color: #263449;
    color: #e2e8f0;
  }

  html[data-theme="dark"] .text-muted {
    color: #94a3b8 !important;
  }
</style>

<div class="login-card">
  <div class="card-body p-5">
    <div class="d-flex justify-content-end mb-2">
      <button class="theme-toggle" type="button" aria-label="Toggle dark mode">
        <span class="theme-toggle-knob">
          <i class="theme-toggle-icon bi bi-sun-fill"></i>
        </span>
      </button>
    </div>

    <div class="text-center mb-4">
      <div class="login-logo">
        <i class="bi bi-piggy-bank-fill"></i>
      </div>
      <h3 class="fw-bold mt-3 mb-1">Welcome Back</h3>
      <p class="text-muted mb-0">Login to continue managing your expenses</p>
    </div>

    <div id="loginError" class="alert alert-danger d-none" role="alert">
      <i class="bi bi-exclamation-triangle-fill me-2"></i>
      <span id="loginErrorText">Invalid email or password.</span>
    </div>

    <form id="loginForm" method="POST" novalidate>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <div class="input-group">
          <span class="input-group-text"
            ><i class="bi bi-envelope-fill"></i
          ></span>
          <input
            type="email"
            name="email"
            id="email"
            class="form-control"
            placeholder="you@example.com"
            required
          />
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input
            type="password"
            name="password"
            id="password"
            class="form-control"
            placeholder="Enter your password"
            required
          />
          <span class="input-group-text toggle-password" id="togglePassword">
            <i class="bi bi-eye-fill" id="toggleIcon"></i>
          </span>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="form-check">
          <input
            class="form-check-input"
            type="checkbox"
            name="remember"
            id="remember"
          />
          <label class="form-check-label" for="remember"> Remember me </label>
        </div>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button
        type="submit"
        id="loginBtn"
        class="btn btn-primary w-100 login-btn"
      >
        <span id="loginBtnText">Login</span>
        <span
          id="loginSpinner"
          class="spinner-border spinner-border-sm d-none"
          role="status"
          aria-hidden="true"
        ></span>
      </button>
    </form>

    <div class="text-center mt-4">
      Don't have an account?
      <a href="/register" class="fw-semibold">Register</a>
    </div>

    <div class="text-center mt-2">
      <a href="/" class="text-muted small text-decoration-none">
        <i class="bi bi-arrow-left"></i> Back Home
      </a>
    </div>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    var togglePassword = document.getElementById("togglePassword");
    var passwordInput = document.getElementById("password");
    var toggleIcon = document.getElementById("toggleIcon");

    togglePassword.addEventListener("click", function () {
      var isPassword = passwordInput.getAttribute("type") === "password";
      passwordInput.setAttribute("type", isPassword ? "text" : "password");
      toggleIcon.classList.toggle("bi-eye-fill");
      toggleIcon.classList.toggle("bi-eye-slash-fill");
    });

    var loginForm = document.getElementById("loginForm");
    var loginBtn = document.getElementById("loginBtn");
    var loginBtnText = document.getElementById("loginBtnText");
    var loginSpinner = document.getElementById("loginSpinner");
    var loginError = document.getElementById("loginError");
    var loginErrorText = document.getElementById("loginErrorText");

    function showError(message) {
      loginErrorText.textContent = message;
      loginError.classList.remove("d-none");
      loginError.classList.remove("shake");
      void loginError.offsetWidth;
      loginError.classList.add("shake");
    }

    function resetButton() {
      loginBtn.disabled = false;
      loginBtnText.textContent = "Login";
      loginSpinner.classList.add("d-none");
    }

    loginForm.addEventListener("submit", function (e) {
      e.preventDefault();

      loginError.classList.add("d-none");

      loginBtn.disabled = true;
      loginBtnText.textContent = "Logging in...";
      loginSpinner.classList.remove("d-none");

      var email = document.getElementById("email").value;
      var password = passwordInput.value;
      var remember = document.getElementById("remember").checked;

      var body = new URLSearchParams();
      body.append("email", email);
      body.append("password", password);
      if (remember) {
        body.append("remember", "on");
      }

      fetch("/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded",
          "X-Requested-With": "XMLHttpRequest",
        },
        body: body,
      })
        .then(function (response) {
          return response.json().then(function (data) {
            return data;
          });
        })
        .then(function (data) {
          if (data.success) {
            loginBtnText.textContent = "Success! Redirecting...";
            window.location.href = data.redirect;
          } else {
            showError(data.message || "Invalid email or password.");
            resetButton();
          }
        })
        .catch(function () {
          showError("Something went wrong. Please try again.");
          resetButton();
        });
    });
  });
</script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
