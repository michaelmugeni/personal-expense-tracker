<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{% block title %}Expense Tracker{% endblock %}</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/dashboard">
          <i class="bi bi-piggy-bank-fill"></i>
          <span>Expense Tracker</span>
        </a>

        <div class="d-flex align-items-center gap-2">
          {% if session.get('user_id') %}

          <a href="/dashboard" class="btn btn-light btn-sm"> Dashboard </a>

          <a href="/summary" class="btn btn-warning btn-sm"> Summary </a>

          <a href="/logout" class="btn btn-danger btn-sm"> Logout </a>

          {% endif %}

          <button
            class="theme-toggle ms-2"
            type="button"
            aria-label="Toggle dark mode"
          >
            <span class="theme-toggle-knob">
              <i class="theme-toggle-icon bi bi-sun-fill"></i>
            </span>
          </button>
        </div>
      </div>
    </nav>

    <div class="container mt-4">{% block content %} {% endblock %}</div>

    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
  </body>
</html>
