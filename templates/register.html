<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body{
        background: linear-gradient(135deg,#198754,#20c997);
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .register-card{
        width:500px;
        border:none;
        border-radius:20px;
        box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }
</style>
<div class="card-body p-5">

    <h2 class="text-center text-success mb-4">
        Create Account
    </h2>

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Username
            </label>

            <input
                type="text"
                name="username"
                class="form-control"
                required
            >

        </div>

        <div class="mb-3">

            <label class="form-label">
                Email
            </label>

            <input
                type="email"
                name="email"
                class="form-control"
                required
            >

        </div>

        <div class="mb-3">

            <label class="form-label">
                Password
            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                required
            >

        </div>

        <button
            type="submit"
            class="btn btn-success w-100"
        >
            Register
        </button>

    </form>

    <div class="text-center mt-3">

        Already have an account?

        <a href="/login">
            Login
        </a>

    </div>

    <div class="text-center mt-2">

        <a href="/">
            Back Home
        </a>

    </div>

</div>
