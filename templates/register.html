<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

    body{
        font-family:'Poppins',sans-serif;
        background: linear-gradient(-45deg,#198754,#20c997,#0d9488,#198754);
        background-size:400% 400%;
        animation: gradientShift 14s ease infinite;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    @keyframes gradientShift{
        0%{background-position:0% 50%;}
        50%{background-position:100% 50%;}
        100%{background-position:0% 50%;}
    }

    .register-card{
        width:500px;
        max-width:92vw;
        border:none;
        border-radius:24px;
        background:rgba(255,255,255,.85);
        backdrop-filter:blur(20px);
        -webkit-backdrop-filter:blur(20px);
        box-shadow:0 20px 60px rgba(0,0,0,.25);
        animation:cardIn .6s ease;
    }

    @keyframes cardIn{
        from{
            opacity:0;
            transform:translateY(30px);
        }
        to{
            opacity:1;
            transform:translateY(0);
        }
    }

    .register-logo{
        width:70px;
        height:70px;
        border-radius:18px;
        background:linear-gradient(135deg,#198754,#20c997);
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:32px;
        color:white;
        margin:0 auto 15px;
    }

    .form-control{
        border-radius:12px;
        padding:12px 14px;
        border:1px solid #dbe4ec;
        transition:.3s;
    }

    .form-control:focus{
        border-color:#198754;
        box-shadow:0 0 0 .2rem rgba(25,135,84,.15);
    }

    .password-toggle{
        cursor:pointer;
        background:white;
        border-left:none;
        border-radius:0 12px 12px 0;
    }

    .input-group .form-control{
        border-radius:12px 0 0 12px;
    }

    .password-strength-bar{
        height:6px;
        border-radius:3px;
        background:#e9ecef;
        overflow:hidden;
        margin-top:8px;
    }

    .password-strength-fill{
        height:100%;
        width:0%;
        border-radius:3px;
        transition:.3s ease;
    }

    .strength-label{
        font-size:12px;
        margin-top:4px;
        display:block;
        font-weight:600;
    }

    .btn-register{
        background:linear-gradient(135deg,#198754,#20c997);
        border:none;
        border-radius:12px;
        padding:12px;
        font-weight:600;
        transition:.3s;
    }

    .btn-register:hover:not(:disabled){
        transform:translateY(-2px);
        box-shadow:0 10px 20px rgba(25,135,84,.35);
    }

    .btn-register:disabled{
        opacity:.85;
    }

    #registerError,
    #registerSuccess{
        display:none;
    }

    .fade-alert{
        animation:fadeIn .35s ease;
    }

    @keyframes fadeIn{
        from{
            opacity:0;
            transform:translateY(-8px);
        }
        to{
            opacity:1;
            transform:translateY(0);
        }
    }

</style>

<div class="card register-card">

    <div class="card-body p-5">

        <div class="text-center">

            <div class="register-logo">
                <i class="bi bi-piggy-bank-fill"></i>
            </div>

            <h3 class="fw-bold mb-1">Create Your Account</h3>

            <p class="text-muted mb-4">
                Start tracking your expenses in minutes
            </p>

        </div>

        <div id="registerError" class="alert alert-danger fade-alert" role="alert"></div>
        <div id="registerSuccess" class="alert alert-success fade-alert" role="alert"></div>

        <form method="POST" id="registerForm">

            <div class="mb-3">

                <label class="form-label">
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    required
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    required
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <div class="input-group">

                    <input
                        type="password"
                        name="password"
                        id="passwordField"
                        class="form-control"
                        required
                    >

                    <span class="input-group-text password-toggle" id="togglePassword">
                        <i class="bi bi-eye-fill" id="toggleIcon"></i>
                    </span>

                </div>

                <div class="password-strength-bar">
                    <div class="password-strength-fill" id="strengthFill"></div>
                </div>
                <span class="strength-label" id="strengthLabel"></span>

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Confirm Password
                </label>

                <div class="input-group">

                    <input
                        type="password"
                        name="confirm_password"
                        id="confirmPasswordField"
                        class="form-control"
                        required
                    >

                    <span class="input-group-text password-toggle" id="toggleConfirmPassword">
                        <i class="bi bi-eye-fill" id="toggleConfirmIcon"></i>
                    </span>

                </div>

            </div>

            <button type="submit" class="btn btn-register w-100 text-white" id="registerBtn">
                <span id="registerBtnText">Register</span>
                <span id="registerSpinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status"></span>
            </button>

        </form>

        <div class="text-center mt-4">

            Already have an account?

            <a href="/login" class="fw-semibold text-decoration-none">
                Login
            </a>

        </div>

        <div class="text-center mt-2">

            <a href="/" class="text-muted text-decoration-none small">
                <i class="bi bi-arrow-left"></i> Back Home
            </a>

        </div>

    </div>

</div>

<script>

    // Password show/hide toggle (password field)
    const toggleBtn = document.getElementById('togglePassword');
    const pwdField = document.getElementById('passwordField');
    const toggleIcon = document.getElementById('toggleIcon');

    toggleBtn.addEventListener('click', function () {

        if (pwdField.type === 'password') {
            pwdField.type = 'text';
            toggleIcon.classList.remove('bi-eye-fill');
            toggleIcon.classList.add('bi-eye-slash-fill');
        } else {
            pwdField.type = 'password';
            toggleIcon.classList.remove('bi-eye-slash-fill');
            toggleIcon.classList.add('bi-eye-fill');
        }

    });

    // Password show/hide toggle (confirm password field)
    const toggleConfirmBtn = document.getElementById('toggleConfirmPassword');
    const confirmPwdField = document.getElementById('confirmPasswordField');
    const toggleConfirmIcon = document.getElementById('toggleConfirmIcon');

    toggleConfirmBtn.addEventListener('click', function () {

        if (confirmPwdField.type === 'password') {
            confirmPwdField.type = 'text';
            toggleConfirmIcon.classList.remove('bi-eye-fill');
            toggleConfirmIcon.classList.add('bi-eye-slash-fill');
        } else {
            confirmPwdField.type = 'password';
            toggleConfirmIcon.classList.remove('bi-eye-slash-fill');
            toggleConfirmIcon.classList.add('bi-eye-fill');
        }

    });

    // Password strength meter
    const strengthFill = document.getElementById('strengthFill');
    const strengthLabel = document.getElementById('strengthLabel');

    pwdField.addEventListener('input', function () {

        const value = pwdField.value;
        let score = 0;

        if (value.length >= 8) score++;
        if (/[A-Z]/.test(value)) score++;
        if (/[0-9]/.test(value)) score++;
        if (/[^A-Za-z0-9]/.test(value)) score++;

        let width = '0%';
        let color = '#e9ecef';
        let label = '';

        if (value.length === 0) {
            width = '0%';
            label = '';
        } else if (score <= 1) {
            width = '25%';
            color = '#dc3545';
            label = 'Weak';
        } else if (score === 2) {
            width = '50%';
            color = '#fd7e14';
            label = 'Fair';
        } else if (score === 3) {
            width = '75%';
            color = '#0dcaf0';
            label = 'Good';
        } else {
            width = '100%';
            color = '#198754';
            label = 'Strong';
        }

        strengthFill.style.width = width;
        strengthFill.style.background = color;
        strengthLabel.textContent = label;
        strengthLabel.style.color = color;

    });

    // AJAX register — no page redirect on failure
    const registerForm = document.getElementById('registerForm');
    const registerBtn = document.getElementById('registerBtn');
    const registerBtnText = document.getElementById('registerBtnText');
    const registerSpinner = document.getElementById('registerSpinner');
    const registerError = document.getElementById('registerError');
    const registerSuccess = document.getElementById('registerSuccess');

    registerForm.addEventListener('submit', async function (e) {

        e.preventDefault();

        registerError.style.display = 'none';
        registerSuccess.style.display = 'none';

        if (pwdField.value !== confirmPwdField.value) {
            registerError.textContent = 'Passwords do not match.';
            registerError.style.display = 'block';
            return;
        }

        registerBtn.disabled = true;
        registerBtnText.textContent = 'Creating account...';
        registerSpinner.classList.remove('d-none');

        const formData = new FormData(registerForm);

        try {

            const response = await fetch('/register', {
                method: 'POST',
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: formData
            });

            const data = await response.json();

            if (data.success) {

                registerSuccess.textContent = 'Account created successfully! Redirecting to login...';
                registerSuccess.style.display = 'block';

                setTimeout(function () {
                    window.location.href = data.redirect;
                }, 1200);

                return;
            }

            registerError.textContent = data.message || 'Something went wrong. Please try again.';
            registerError.style.display = 'block';

        } catch (err) {

            registerError.textContent = 'Something went wrong. Please try again.';
            registerError.style.display = 'block';

        }

        registerBtn.disabled = false;
        registerBtnText.textContent = 'Register';
        registerSpinner.classList.add('d-none');

    });

</script>
