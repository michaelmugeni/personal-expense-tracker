{% extends 'base.html' %}

{% block title %}Add Expense{% endblock %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-success text-white">
        <h3>Add New Expense</h3>
    </div>

    <div class="card-body">

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Category
                </label>

                <select name="category_id"
                        class="form-select"
                        required>

                    {% for category in categories %}

                    <option value="{{ category.id }}">
                        {{ category.name }}
                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Amount (KES)
                </label>

                <input
                    type="number"
                    step="0.01"
                    name="amount"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Description
                </label>

                <input
                    type="text"
                    name="description"
                    class="form-control">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Date
                </label>

                <input
                    type="date"
                    name="expense_date"
                    class="form-control"
                    required>

            </div>

            <button type="submit"
                    class="btn btn-success">
                Save Expense
            </button>

            <a href="/dashboard"
               class="btn btn-secondary">
               Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}
